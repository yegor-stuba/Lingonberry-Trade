<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}Lingonberry Trading Bot{% endblock %}</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" title="Bootstrap CSS">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.3/font/bootstrap-icons.css" title="Bootstrap Icons">
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background-color: #f8f9fa;
            }
            .sidebar {
                position: fixed;
                top: 0;
                bottom: 0;
                left: 0;
                z-index: 100;
                padding: 48px 0 0;
                box-shadow: inset -1px 0 0 rgba(0, 0, 0, .1);
                width: 80px;
                background-color: #212529;
                transition: width 0.3s ease;
            }
            .sidebar:hover {
                width: 200px;
            }
            .sidebar .nav-link {
                color: #adb5bd;
                text-align: center;
                padding: 1rem 0;
                transition: all 0.3s ease;
            }
            .sidebar:hover .nav-link {
                text-align: left;
                padding: 1rem 1rem;
            }
            .sidebar .nav-link:hover {
                color: #fff;
                background-color: rgba(255, 255, 255, 0.1);
            }
            .sidebar .nav-link.active {
                color: #fff;
                background-color: rgba(255, 255, 255, 0.2);
            }
            .sidebar .nav-link i {
                font-size: 1.5rem;
                margin-right: 0;
                transition: margin-right 0.3s ease;
            }
            .sidebar:hover .nav-link i {
                margin-right: 0.5rem;
            }
            .sidebar .nav-link span {
                display: none;
                opacity: 0;
                transition: opacity 0.3s ease;
            }
            .sidebar:hover .nav-link span {
                display: inline;
                opacity: 1;
            }
            .main-content {
                margin-left: 80px;
                padding: 2rem;
            }
            .card {
                border-radius: 10px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                margin-bottom: 1.5rem;
            }
            .card-header {
                background-color: #f8f9fa;
                border-bottom: 1px solid rgba(0, 0, 0, 0.125);
                font-weight: 600;
            }
            .table th {
                font-weight: 600;
                background-color: #f8f9fa;
            }
            .win {
                color: #198754;
            }
            .loss {
                color: #dc3545;
            }
        </style>
        {% block head %}{% endblock %}
    </head>
    <body>
        <div class="sidebar">
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="{{ url_for('index') }}" title="Dashboard">
                        <i class="bi bi-house-door" aria-hidden="true"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/performance' %}active{% endif %}" href="{{ url_for('performance') }}" title="Performance">
                        <i class="bi bi-graph-up" aria-hidden="true"></i>
                        <span>Performance</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/journal' %}active{% endif %}" href="{{ url_for('journal') }}" title="Journal">
                        <i class="bi bi-journal-text" aria-hidden="true"></i>
                        <span>Journal</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/backtest' %}active{% endif %}" href="{{ url_for('backtest') }}" title="Backtest">
                        <i class="bi bi-clock-history" aria-hidden="true"></i>
                        <span>Backtest</span>
                    </a>
                </li>
            </ul>
        </div>
        
        <div class="main-content">
            {% block content %}{% endblock %}
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        {% block scripts %}{% endblock %}
    </body>
</html>
